name: CI

on:
  # Skip doc-only changes (Markdown anywhere) — no need to run fmt/clippy/build/test
  # when nothing compilable changed. A commit touching any non-.md file still runs.
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
  pull_request:
    paths-ignore:
      - '**.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy-all-features:
    name: clippy-all-features
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Clippy (all features)
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

  clippy-no-default-features:
    name: clippy-no-default-features
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Clippy (no default features)
        run: cargo clippy --all-targets --no-default-features --locked -- -D warnings

  test-all-features:
    name: test-all-features
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Test (all features)
        run: cargo test --all-features --locked --verbose

  test-no-default-features:
    name: test-no-default-features
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Test (no default features)
        run: cargo test --no-default-features --locked --verbose

  msrv-check:
    name: msrv-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Floor is set by `let`-chains (stable since Rust 1.88), used throughout.
      # Keep this in sync with `rust-version` in Cargo.toml.
      - name: Install MSRV toolchain
        uses: dtolnay/rust-toolchain@1.88.0

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check (all features, locked)
        run: cargo check --all-features --locked

  generated-artifacts:
    name: generated-artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build nbox
        run: cargo build --all-features --locked --verbose

      - name: Generate man pages and shell completions
        shell: bash
        run: |
          set -euo pipefail
          out="$RUNNER_TEMP/generated"
          mkdir -p "$out/completions" "$out/man"
          ./target/debug/nbox man "$out/man"
          ./target/debug/nbox completions bash > "$out/completions/nbox.bash"
          ./target/debug/nbox completions zsh > "$out/completions/_nbox"
          ./target/debug/nbox completions fish > "$out/completions/nbox.fish"
          ./target/debug/nbox completions powershell > "$out/completions/_nbox.ps1"
          ./target/debug/nbox completions elvish > "$out/completions/nbox.elv"
          test -s "$out/man/nbox.1"
          test -s "$out/completions/nbox.bash"

  security-audit:
    name: security-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo-audit
        uses: actions/cache@v6
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-0.21

      - name: Install cargo-audit
        run: command -v cargo-audit || cargo install cargo-audit --locked

      - name: Run security audit
        run: cargo audit

  # Decide the cross-compile matrix by event. On a PR, build ONLY linux-musl (the
  # release-critical static target, and the leg that runs on a fast, never-queued
  # ubuntu runner) so the PR gate isn't gated on the slow macOS/Windows runners —
  # the matrix legs run in parallel, so PR wall-clock is the slowest leg, and
  # those are it. The FULL 4-target matrix runs on every push to master (i.e.
  # right after each squash-merge), and release.yml's 6-target build is the final
  # pre-tag gate. So every platform is still compiled before any release ships;
  # only per-PR latency drops. (Branch protection should require the PR check
  # `platform-build (x86_64-unknown-linux-musl)` — the macOS/Windows legs only
  # exist on master pushes.)
  platform-matrix:
    name: platform-matrix
    runs-on: ubuntu-latest
    outputs:
      include: ${{ steps.set.outputs.include }}
    steps:
      - id: set
        shell: bash
        run: |
          musl='{"target":"x86_64-unknown-linux-musl","os":"ubuntu-latest","install_musl":true}'
          mac_arm='{"target":"aarch64-apple-darwin","os":"macos-latest","install_musl":false}'
          mac_x86='{"target":"x86_64-apple-darwin","os":"macos-latest","install_musl":false}'
          win='{"target":"x86_64-pc-windows-msvc","os":"windows-latest","install_musl":false}'
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "include=[$musl]" >> "$GITHUB_OUTPUT"
          else
            echo "include=[$musl,$mac_arm,$mac_x86,$win]" >> "$GITHUB_OUTPUT"
          fi

  platform-build:
    needs: platform-matrix
    name: platform-build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.platform-matrix.outputs.include) }}

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install musl tools
        if: matrix.install_musl
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build target
        run: cargo build --all-features --locked --target ${{ matrix.target }} --verbose
