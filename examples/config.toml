# Example nbox configuration.
#
# Real config lives at ~/.config/nbox/config.toml (Linux/macOS) or
# %APPDATA%\nbox\config.toml (Windows) — create it with `nbox config init`.
# Tokens are NOT stored here: point `token_env` at an environment variable, or
# export NBOX_TOKEN to override per-invocation.

config_version = 1
active_profile = "work"

[ui]
theme = "default"          # see `nbox` then `t` to cycle; 12 built-in themes
confirm_writes = true      # reserved for v0.2 writes
# refresh_secs = 30        # TUI auto-refresh interval (omit/0 = off)

[profiles.work]
url = "https://netbox.example.com"
token_env = "NETBOX_TOKEN"   # nbox reads the token from this env var
auth_scheme = "auto"         # auto | bearer | token (auto-detects v2 nbt_ tokens)
verify_tls = true
timeout_secs = 15
page_size = 100
exclude_config_context = true   # drop the large config_context on devices/VMs

[profiles.lab]
url = "https://netbox.lab.example.com"
token_env = "NETBOX_LAB_TOKEN"
verify_tls = false           # labs with self-signed certs; never use in prod
